customCategory: sexlab_comfort
name: ShowComfort
description_: 'PARAMS: {"direction":"give|get", "intent":"who, why, and how"} - [direction] comfort with physical contact'
description:  'You [direction] comfort with physical action {"direction":"give|get", "intent":"who, why, and how"}'
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: get_global_value
        arguments:
          - SkyrimNet_SexLab_ostim_player
        comparisonOperator: ==
        expectedValue: 0
      - decoratorName: get_faction_rank
        arguments:
          - currentActor
          - SexLabAnimatingFaction
        comparisonOperator: <
        expectedValue: 1
      - decoratorName: is_in_faction
        arguments:
          - currentActor
          - dse_dm_FactionActorUsingDevice
        comparisonOperator: ==
        expectedValue: false
      - decoratorName: is_in_faction
        arguments:
          - currentActor
          - OStimActorCountFaction
        comparisonOperator: ==
        expectedValue: false
      - decoratorName: is_in_combat
        arguments:
          - currentActor
        comparisonOperator: ==
        expectedValue: false
      - decoratorName: papyrus_util
        arguments:
          - "HasIntValue"
          - currentActor
          - "skyrimnet_sexlab_actor_lock"
        comparisonOperator: ==
        expectedValue: false