name: Rape_Start
description: "[style] [type] sexual assault on [victim]"
questEditorId: SkyrimNet_SexLab
scriptName: SkyrimNet_SexLab_Actions
executionFunctionName: Rape_Start
defaultPriority: 7
parameterMapping:
  - type: speaker
    name: speaker
    description: Speaker Actor parameter (triggering entity)
  - type: dynamic
    name: target
    description: Object Actor (maybe Speaker)
  - type: dynamic
    name: direction
    description: giving|getting
  - type: dynamic
    name: style
    description: forceful|normal|gentle
  - type: dynamic
    name: type
    description: oral|vaginal|anal|masturbation|handjob|boobjob|thighjob|fisting|dildo|fingering|footjob
  - type: dynamic
    name: victim
    description: Object Actor (Target or Speaker)
eligibilityRules:
  - conditions:
      - decoratorName: get_global_value
        arguments:
          - SkyrimNet_SexLab_ostim_player
        comparisonOperator: ==
        expectedValue: 1
      - decoratorName: get_faction_rank
        arguments:
          - currentActor
          - SexLabAnimatingFaction
        comparisonOperator: <
        expectedValue: 1
      - decoratorName: is_in_faction
        arguments:
          - currentActor
          - dse_dm_FactionActorUsingDevice
        comparisonOperator: ==
        expectedValue: false
      - decoratorName: is_in_faction
        arguments:
          - currentActor
          - OStimActorCountFaction
        comparisonOperator: ==
        expectedValue: false
      - decoratorName: is_in_combat
        arguments:
          - currentActor
        comparisonOperator: ==
        expectedValue: false
      - decoratorName: papyrus_util
        arguments:
          - "HasIntValue"
          - currentActor
          - "skyrimnet_sexlab_actor_lock"
        comparisonOperator: ==
        expectedValue: false