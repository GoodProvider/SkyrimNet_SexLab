        arguments:
          - currentActor
          - dse_dm_FactionActorUsingDevice
        comparisonOperator: ==
        expectedValue: false
      - decoratorName: is_in_faction
        arguments:
          - currentActor
          - OStimActorCountFaction
        comparisonOperator: ==
        expectedValue: false
      - decoratorName: is_in_combat
        arguments:
          - currentActor
        comparisonOperator: ==
        expectedValue: false
      - decoratorName: papyrus_util
        arguments:
          - "HasIntValue"
          - currentActor
          - "skyrimnet_sexlab_actor_lock"
        comparisonOperator: ==
        expectedValue: false