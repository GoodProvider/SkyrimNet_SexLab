customCategory: sexlab_nonsexual
name: ExpressPhysicallyNonsexually
description: 'PARAMS: {"direction":"giving|getting", "what":"comforting|greeting|showing affection", "type":"hug|kiss|hugging|kissing|cuddling", "intent":"who, how, and why"} - [what] by [direction] [type]' 
description_:  'You [direction] [method] {"direction":"give|get", "intent":"who, why, and how", "method":"hug|cuddle|kiss"}'
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: get_global_value
        arguments:
          - SkyrimNet_SexLab_ostim_player
        comparisonOperator: ==
        expectedValue: 0
      - decoratorName: get_faction_rank
        arguments:
          - currentActor
          - SexLabAnimatingFaction
        comparisonOperator: <
        expectedValue: 1
      - decoratorName: is_in_faction
        arguments:
          - currentActor
          - dse_dm_FactionActorUsingDevice
        comparisonOperator: ==
        expectedValue: false
      - decoratorName: is_in_faction
        arguments:
          - currentActor
          - OStimActorCountFaction
        comparisonOperator: ==
        expectedValue: false
      - decoratorName: is_in_combat
        arguments:
          - currentActor
        comparisonOperator: ==
        expectedValue: false
      - decoratorName: papyrus_util
        arguments:
          - "HasIntValue"
          - currentActor
          - "skyrimnet_sexlab_actor_lock"
        comparisonOperator: ==
        expectedValue: false