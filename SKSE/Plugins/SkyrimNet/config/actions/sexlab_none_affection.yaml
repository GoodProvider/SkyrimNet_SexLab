name: Affection_Show
description: "show affection with [type]"
questEditorId: SkyrimNet_SexLab
scriptName: SkyrimNet_SexLab_Actions
executionFunctionName: Affection_Start
defaultPriority: 7
parameterMapping:
  - type: speaker
    name: speaker
    description: Speaker Actor parameter (triggering entity)
  - type: dynamic
    name: target
    description: consenting actor
  - type: dynamic
    name: style
    description: forceful|normal|gentle
  - type: dynamic
    name: type
    description: kissing|hugging
  - type: static
    name: narration
    value: silent
eligibilityRules:
  - conditions:
      - decoratorName: get_global_value
        arguments:
          - SkyrimNet_SexLab_ostim_player
        comparisonOperator: ==
        expectedValue: 0
      - decoratorName: is_in_faction
        arguments:
          - currentActor
          - SexLabAnimatingFaction
        comparisonOperator: ==
        expectedValue: false
      - decoratorName: is_in_faction
        arguments:
          - currentActor
          - OStimActorCountFaction
        comparisonOperator: ==
        expectedValue: false
      - decoratorName: is_in_combat
        arguments:
          - currentActor
        comparisonOperator: ==
        expectedValue: false
      - decoratorName: papyrus_util
        arguments:
          - "HasIntValue"
          - currentActor
          - "skyrimnet_sexlab_actor_lock"
        comparisonOperator: ==
        expectedValue: false