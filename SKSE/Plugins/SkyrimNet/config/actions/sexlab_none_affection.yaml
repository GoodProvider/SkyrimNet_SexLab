name: Kiss_Start
description: "non-sexual [type] affection"
questEditorId: SkyrimNet_SexLab
scriptName: SkyrimNet_SexLab_Actions
executionFunctionName: Affection_Start
defaultPriority: 7
parameterMapping:
  - type: speaker
    name: speaker
    description: Speaker Actor parameter (triggering entity)
  - type: dynamic
    name: target
    description: consenting actor
  - type: dynamic
    name: style
    description: forceful|normal|gentle
  - type: dynamic
    name: type
    description: kissing|hugging|cuddling
eligibilityRules:
  - conditions:
      - decoratorName: get_global_value
        arguments:
          - skyrimnet_sexlab_ostim_player
        comparisonOperator: ==
        expectedValue: 0
      - decoratorName: is_in_faction
        arguments:
          - currentActor
          - SexLabAnimatingFaction
        comparisonOperator: ==
        expectedValue: false
      - decoratorName: is_in_faction
        arguments:
          - currentActor
          - OStimActorCountFaction
        comparisonOperator: ==
        expectedValue: false
      - decoratorName: is_in_faction
        arguments:
          - currentActor
          - ChildFaction
        comparisonOperator: ==
        expectedValue: false
      - decoratorName: is_in_combat
        arguments:
          - currentActor
        comparisonOperator: ==
        expectedValue: false
      - decoratorName: decnpc
        arguments:
          - currentActor
        comparisonOperator: ==
        expectedValue: false
        resultPath: isChild